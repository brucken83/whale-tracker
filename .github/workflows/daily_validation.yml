name: daily-validation

on:
  schedule:
    - cron: "25 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create runtime folders
        run: |
          mkdir -p data logs charts state

      - name: Run daily validation
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
        run: |
          if [ -f backtest_runner.py ]; then
            python backtest_runner.py validate
          else
            echo "backtest_runner.py not found, skipping validation"
          fi

      - name: Commit validation outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ logs/ charts/ state/ || true
          git diff --staged --quiet || git commit -m "chore: daily validation update"
          git push
